}
function toggleSubtask(taskId, i){
  const task = state.tasks.find(t=>t.id===taskId);
  if(!task) return;
  const subtasks = (task.subtasks||[]).slice();
  subtasks[i] = { ...subtasks[i], done: !subtasks[i].done };
  upsert("tasks", taskId, { subtasks });
}
function addSubtaskDraft(taskId){
  const input = document.getElementById("tf_new_subtask");
  const text = input.value.trim();
  if(!text) return;
  const task = state.modal.task;
  task.subtasks = (task.subtasks||[]).concat([{ text, done:false }]);
  render();
}
function addTaskComment(taskId){
  const input = document.getElementById("tf_new_comment");
  const text = input.value.trim();
  if(!text) return;
  // Posts immediately (unlike subtasks, which wait for the Save button) so a
  // comment can't be lost by closing the modal without saving, and so it
  // shows up right away for whoever else is on the task.
  const author = state.currentAssistant ? state.currentAssistant.name : "Admin";
  const task = state.modal.task;
  const discussion = [...(task.discussion||[]), { id:newId("comment"), author, text, date:new Date().toISOString() }];
  task.discussion = discussion;
  upsert("tasks", taskId, { discussion });
  render();
}
function markCommentSeen(taskId, commentId){
  if(!state.currentAssistant) return;
  const task = state.tasks.find(t=>t.id===taskId) || (state.modal && state.modal.task);
  if(!task) return;
  const discussion = (task.discussion||[]).map(d=>{
    if(d.id!==commentId) return d;
    const seenBy = d.seenBy||[];
    if(seenBy.some(s=>s.assistantId===state.currentAssistant.id)) return d;
    return { ...d, seenBy: [...seenBy, { assistantId: state.currentAssistant.id, name: state.currentAssistant.name, seenAt: new Date().toISOString() }] };
  });
  task.discussion = discussion;
  upsert("tasks", taskId, { discussion });
  render();
}
function addClientTaskComment(taskId){
  const input = document.getElementById("client_comment_"+taskId);
  const text = input.value.trim();
  if(!text) return;
  const task = state.tasks.find(t=>t.id===taskId);
  if(!task) return;
  const client = state.clients.find(c=>c.id===state.currentClientId);
  const author = (client ? client.name : "Client") + " (Client)";
  const discussion = [...(task.discussion||[]), { id:newId("comment"), author, text, date:new Date().toISOString() }];
  upsert("tasks", taskId, { discussion });
  render();
}
function saveTask(taskId){
  const task = state.modal.task;
  const assignees = Array.from(document.querySelectorAll(".tf_assignee:checked")).map(el=>el.value);
  const newStatus = document.getElementById("tf_status").value;
  // Stamp completedAt the moment a task lands on Done, and clear it if it's
  // reopened — the weekly client report needs to know WHEN a task finished,
  // not just that it's currently sitting in Done. A manually-set completed
  // date (e.g. correcting a status today for a task actually finished weeks
  // ago) always wins over the auto-stamp, so it doesn't wrongly land on a
  // report it doesn't belong on.
  const completedField = document.getElementById("tf_completed").value;
  let completedAt = task.completedAt || null;
  if(newStatus === "Done"){
    if(completedField) completedAt = new Date(completedField + "T12:00:00").toISOString();
    else if(task.status !== "Done") completedAt = new Date().toISOString();
  } else {
    completedAt = null;
  }
  const payload = {
    title: document.getElementById("tf_title").value.trim(),
    clientId: document.getElementById("tf_client").value,
    category: document.getElementById("tf_category").value,
    status: newStatus,
    description: document.getElementById("tf_description").value.trim(),
    privateNotes: document.getElementById("tf_private_notes").value.trim(),
    dueDate: document.getElementById("tf_due").value,
    priority: document.getElementById("tf_priority").checked,
    taskNumber: task.taskNumber || nextTaskNumber(),
    assignees,
    subtasks: task.subtasks || [],
    discussion: task.discussion || [],
    completedAt
  };
  upsert("tasks", taskId, payload);
  closeModal();
}
function deleteTask(taskId){
  if(confirm("Delete this task?")){ remove("tasks", taskId); closeModal(); }
}

// --- Client editor modal ---
function renderClientEditorModal(client){
  const c = client || {};
  return `
    <div class="modal">
      <h3>${client ? "Edit client" : "New client"}</h3>
      <div class="row"><div><label class="small">Name</label><input id="cf_name" value="${c.name||''}"></div></div>
      <div class="row" style="margin-top:8px;">
        <div><label class="small">Package hours</label><input id="cf_pkg" value="${c.packageHours||''}"></div>
        <div><label class="small">Cycle</label>
          <select id="cf_cycle">
            ${["biweekly","monthly","quarterly","annual"].map(cy=>`<option ${c.cycleType===cy?'selected':''}>${cy}</option>`).join("")}
          </select>
        </div>
      </div>
      <div style="margin-top:8px;">
        <label class="small">Assigned assistants</label>
        ${assignableAssistants(c.assistantIds).map(a=>`
          <label style="display:inline-flex;align-items:center;gap:4px;margin-right:10px;font-size:13px;">
            <input type="checkbox" value="${a.id}" ${(c.assistantIds||[]).includes(a.id)?'checked':''} class="cf_assistant"> ${a.name}${a.active===false?' (former)':''}
          </label>
        `).join("")}
      </div>
      <div style="margin-top:14px;display:flex;justify-content:flex-end;gap:8px;">
        <button class="secondary" onclick="closeModal()">Cancel</button>
        <button onclick="saveClient('${c.id||''}')">Save</button>
      </div>
    </div>
  `;
}
function saveClient(existingId){
  const id = existingId || newId("client");
  const assistantIds = Array.from(document.querySelectorAll(".cf_assistant:checked")).map(el=>el.value);
  upsert("clients", id, {
    name: document.getElementById("cf_name").value.trim(),
    packageHours: parseFloat(document.getElementById("cf_pkg").value)||0,
    cycleType: document.getElementById("cf_cycle").value,
    assistantIds,
    notes: [], specialDates: [], vendors: [], inspections: []
  });
  state.modal = null;
  // Land straight on the new client's onboarding Profile tab — that's the
  // natural next step, whether filled out now or during a later orientation visit.
  if(!existingId){
    state.activeTab = "clients";
    state.selectedClientId = id;
    state.crmSubTab = "profile";
  }
  render();
}

// --- Time entry editor modal (admin) ---
function toDatetimeLocalValue(iso){
  if(!iso) return "";
  const d = new Date(iso);
  const tzOffset = d.getTimezoneOffset() * 60000;
  return new Date(d.getTime() - tzOffset).toISOString().slice(0,16);
}
function fromDatetimeLocalValue(val){
  return val ? new Date(val).toISOString() : null;
}
function openManualTimeEntry(){
  const now = toDatetimeLocalValue(new Date().toISOString());
  state.modal = { type:"manualTimeEntry", rows: [{ id:newId("row"), clockIn: now, clockOut: now, note:"" }] };
  render();
}
function addManualEntryRow(){
  const now = toDatetimeLocalValue(new Date().toISOString());
  state.modal.rows.push({ id:newId("row"), clockIn: now, clockOut: now, note:"" });
  render();
}
function removeManualEntryRow(rowId){
  state.modal.rows = state.modal.rows.filter(r=>r.id!==rowId);
  render();
}
function updateManualEntryRow(rowId, field, value){
  state.modal.rows = state.modal.rows.map(r=>r.id===rowId ? {...r, [field]:value} : r);
}
function renderManualTimeEntryModal(){
  const rows = state.modal.rows;
  return `
    <div class="modal">
      <h3>Log time manually</h3>
      <div class="small" style="margin-bottom:8px;">For time already worked without clocking in live — enter the real clock-in/out times. Add multiple blocks below if this task had more than one session.</div>
      ${state.role==='admin' ? `
      <div class="row">
        <div><label class="small">Assistant</label>
          <select id="mte_assistant">
            ${state.settings.assistants.filter(a=>a.active!==false).map(a=>`<option value="${a.id}">${a.name}</option>`).join("")}
          </select>
        </div>
      </div>` : ""}
      <div class="row" style="margin-top:8px;">
        <div><label class="small">Task</label>
          <input id="mte_task" list="mte_task_list" placeholder="Search by # or title...">
          <datalist id="mte_task_list">${taskSearchOptions(state.tasks)}</datalist>
        </div>
      </div>
      <div style="margin-top:10px;">
        <label class="small">Time blocks for this task</label>
        ${rows.map((r,i)=>`
          <div class="row" style="margin-top:6px;align-items:flex-end;">
            <div><label class="small">Clock in</label><input type="datetime-local" id="mte_in_${r.id}" value="${r.clockIn}" onchange="updateManualEntryRow('${r.id}','clockIn',this.value)"></div>
            <div><label class="small">Clock out</label><input type="datetime-local" id="mte_out_${r.id}" value="${r.clockOut}" onchange="updateManualEntryRow('${r.id}','clockOut',this.value)"></div>
            <div><label class="small">Note (optional)</label><input id="mte_note_${r.id}" value="${(r.note||'').replace(/"/g,'&quot;')}" oninput="updateManualEntryRow('${r.id}','note',this.value)"></div>
            ${rows.length>1 ? `<button class="danger" style="padding:8px;" onclick="removeManualEntryRow('${r.id}')">✕</button>` : ""}
          </div>
        `).join("")}
        <button class="secondary" style="margin-top:8px;" onclick="addManualEntryRow()">+ Add another time block</button>
      </div>
      <div style="margin-top:14px;display:flex;justify-content:flex-end;gap:8px;">
        <button class="secondary" onclick="closeModal()">Cancel</button>
        <button onclick="saveManualTimeEntry()">Log time</button>
      </div>
    </div>
  `;
}
function saveManualTimeEntry(){
  const task = resolveTaskFromSearch(document.getElementById("mte_task").value);
  const assistantId = state.role==='admin' ? document.getElementById("mte_assistant").value : state.currentAssistant.id;
  if(!task){ alert("Pick a task from the list first — search by its # or title."); return; }
  const rows = state.modal.rows;
  for(const r of rows){
    if(!r.clockIn || !r.clockOut){ alert("Every time block needs both a clock in and clock out."); return; }
    if(new Date(r.clockOut) <= new Date(r.clockIn)){ alert("Clock out has to be after clock in on every time block."); return; }
  }
  rows.forEach(r=>{
    const entry = {
      id: newId("te"),
      taskId: task.id, assistantId,
      clientId: task.clientId || INTERNAL_CLIENT_ID,
      clockIn: fromDatetimeLocalValue(r.clockIn), clockOut: fromDatetimeLocalValue(r.clockOut), clockOutManual: true,
      note: (r.note||"").trim(),
    };
    upsert("timeEntries", entry.id, entry);
  });
  closeModal();
}
function openTimeEntryEditor(entryId){
  const entry = state.timeEntries.find(e=>e.id===entryId);
  if(!entry) return;
  state.modal = { type:"timeEntryEditor", entry };
  render();
}
function renderTimeEntryEditorModal(entry){
  const task = state.tasks.find(t=>t.id===entry.taskId);
  return `
    <div class="modal">
      <h3>Edit time entry</h3>
      <div class="small" style="margin-bottom:8px;">${task ? task.title : '(deleted task)'}${entry.clientId===INTERNAL_CLIENT_ID ? ' · Internal / Modern Co.' : ''}</div>
      ${state.role==='admin' ? `
      <div class="row">
        <div><label class="small">Assistant</label>
          <select id="tef_assistant">
            ${state.settings.assistants.map(a=>`<option value="${a.id}" ${entry.assistantId===a.id?'selected':''}>${a.name}${a.active===false?' (former)':''}</option>`).join("")}
          </select>
        </div>
      </div>` : ""}
      <div class="row" style="margin-top:8px;">
        <div><label class="small">Clock in</label><input type="datetime-local" id="tef_in" value="${toDatetimeLocalValue(entry.clockIn)}"></div>
        <div><label class="small">Clock out (blank = still clocked in)</label><input type="datetime-local" id="tef_out" value="${toDatetimeLocalValue(entry.clockOut)}"></div>
      </div>
      <div style="margin-top:8px;">
        <label class="small">Note</label>
        <input id="tef_note" value="${(entry.note||'').replace(/"/g,'&quot;')}" placeholder="What this entry covers">
      </div>
      ${state.role==='admin' ? `
      <div style="margin-top:10px;">
        <label style="display:inline-flex;align-items:center;gap:6px;font-size:13px;">
          <input type="checkbox" id="tef_flagged" ${entry.flagged?'checked':''}> Flag for review
        </label>
      </div>
      <div style="margin-top:8px;">
        <label class="small">Flag reason (optional)</label>
        <input id="tef_flagnote" value="${(entry.flagNote||'').replace(/"/g,'&quot;')}">
      </div>` : ""}
      <div style="margin-top:14px;display:flex;justify-content:space-between;">
        <button class="danger" onclick="deleteTimeEntry('${entry.id}'); closeModal();">Delete</button>
        <div>
          <button class="secondary" onclick="closeModal()">Cancel</button>
          <button onclick="saveTimeEntryEdit('${entry.id}')">Save</button>
        </div>
      </div>
    </div>
  `;
}
function saveTimeEntryEdit(entryId){
  const clockIn = fromDatetimeLocalValue(document.getElementById("tef_in").value);
  const clockOut = fromDatetimeLocalValue(document.getElementById("tef_out").value);
  if(!clockIn){ alert("Clock in time is required."); return; }
  if(clockOut && new Date(clockOut) <= new Date(clockIn)){ alert("Clock out has to be after clock in."); return; }
  const payload = {
    clockIn,
    clockOut,
    clockOutManual: true,
    note: document.getElementById("tef_note").value.trim(),
  };
  if(state.role==='admin'){
    payload.assistantId = document.getElementById("tef_assistant").value;
    payload.flagged = document.getElementById("tef_flagged").checked;
    payload.flagNote = document.getElementById("tef_flagnote").value.trim();
  }
  upsert("timeEntries", entryId, payload);
  closeModal();
}

// --- Modal shell ---
function renderModal(){
  if(!state.modal) return "";
  const content = state.modal.type==="taskEditor" ? renderTaskEditorModal(state.modal.task)
    : state.modal.type==="clientEditor" ? renderClientEditorModal(state.modal.client)
    : state.modal.type==="employeeEditor" ? renderEmployeeEditorModal()
    : state.modal.type==="agreementGate" ? renderAgreementGateModal(state.modal.assistant)
    : state.modal.type==="reassignClient" ? renderReassignModal(state.modal.client)
    : state.modal.type==="timeEntryEditor" ? renderTimeEntryEditorModal(state.modal.entry)
    : state.modal.type==="appGuide" ? renderAppGuideModal(state.modal.assistant)
    : state.modal.type==="appGuideReadOnly" ? renderAppGuideReadOnlyModal()
    : state.modal.type==="manualTimeEntry" ? renderManualTimeEntryModal()
    : state.modal.type==="imageViewer" ? renderImageViewerModal(state.modal.dataUrl)
    : "";
  const dismissable = state.modal.type !== "agreementGate" && state.modal.type !== "appGuide";
  return `<div class="modal-bg" onclick="${dismissable ? "if(event.target===this) closeModal()" : ""}">${content}</div>`;
}
function closeModal(){ state.modal = null; render(); }

// ---- Boot ----
boot();
</script>
