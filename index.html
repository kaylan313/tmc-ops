<script>
/* =========================================================================
   THE MODERN CONCIERGE — INTERNAL OPS PLATFORM
   Single-file HTML/vanilla JS, Firestore-backed.

   SETUP REQUIRED:
   1. Replace `firebaseConfig` below with your project's config (same
      Firebase project already used for the orientation-sync integration).
   2. In Firestore, create a `settings/access` document (see SEED_SETTINGS
      below for shape) with your real admin passcode, assistant access
      codes, and client portal codes — this file seeds it automatically
      on first run if it doesn't exist yet.
   3. Set Firestore security rules appropriately before going to
      production — this app currently assumes rules are permissive for
      the passcode-gated collections. Tightening this is a good first
      task to hand to Claude Code.

   RESILIENCE NOTE: Firebase init is wrapped in try/catch and the UI
   renders before any Firestore call is attempted, so a missing/blocked
   SDK or bad config degrades to a local-only demo mode with a visible
   warning banner, instead of a blank page.
   ========================================================================= */

// ---- 1. Firebase config ----
const firebaseConfig = {
  apiKey: "AIzaSyCCLskIvVB40GjB9bXEG2GdMSSBRjvc6-0",
  authDomain: "modern-co-dashboard.firebaseapp.com",
  projectId: "modern-co-dashboard",
  storageBucket: "modern-co-dashboard.firebasestorage.app",

};
const FIREBASE_CONFIGURED = firebaseConfig.apiKey !== "YOUR_API_KEY";
let db = null;
let FIREBASE_AVAILABLE = false;
try{
  if(typeof firebase === "undefined") throw new Error("Firebase SDK did not load (blocked script or no network).");
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
  FIREBASE_AVAILABLE = true;
}catch(e){
  console.warn("Firebase failed to initialize — running in local-only mode:", e);
}

// ---- 2. Seed data (used only if Firestore collections are empty) ----
const SEED_ASSISTANTS = [
  { name:"Alex", active:false },
  { name:"Victoria Haas" },
  { name:"Heidi Jo Peaden", hireDate:"2026-04-15" },
  { name:"Cherish Campbell" },
  { name:"Livia Goree" },
  { name:"Shae Trahan" },
  { name:"Victoria Oser" },
  { name:"Olivia Vanderhoeven" },
  { name:"Rachel Morvant" }
].map((a,i)=>({ id:"asst_"+(i+1), accessCode:"", active:true, agreementSigned:true, hourlyRate:22, hireDate:"", ...a }));

const SEED_SETTINGS = {
  adminPasscode: "melain10",
  assistants: SEED_ASSISTANTS,
  internalHoursBudget: 0
};

const INTERNAL_CLIENT_ID = "internal";
const STATUSES = ["To do","Researching","In progress","Pending approval","Done"];
const TIER_THRESHOLDS = [50,75,90,100];
// Real rate card from the Personal Assistant Services Agreement — same
// pricing regardless of term type (pilot / 3-month / 12-month). A client
// picks ONE package tier — Home Reset is an alternative tier, not an add-on
// stacked on top of an hourly membership — so it shares the exact same
// packageHours/packagePrice/cycle machinery as the hourly tiers below.
const PACKAGE_TIERS = [
  { key:"m20", label:"Membership — 20 hrs/mo", hours:20, price:950 },
  { key:"m40", label:"Membership — 40 hrs/mo", hours:40, price:1700 },
  { key:"m60", label:"Membership — 60 hrs/mo", hours:60, price:2400 },
  { key:"m80", label:"Membership — 80 hrs/mo", hours:80, price:3200 },
  { key:"reset_refresh", label:"Home Reset — The Refresh", hours:6, price:325 },
  { key:"reset_restore", label:"Home Reset — The Restore", hours:12, price:575 }
];
const OVERAGE_RATE = 50; // $/hr beyond the package

// ---- 3. App state ----
let state = {
  view: "login",
  role: null,            // 'admin' | 'team' | 'client'
  currentAssistant: null,
  currentClientId: null,
  settings: SEED_SETTINGS,
  firebaseError: null,
  clients: [],
  tasks: [],
  timeEntries: [],
  activeTab: "dashboard",
  crmSubTab: "tasks",
  selectedClientId: null,
  modal: null,

  kanbanFilter: { clientId: "all", category: "all", onlyMine: false, hideDone: true }
};

// ---- 4. Firestore helpers ----
function col(name){
  if(!db) throw new Error("Firebase is not connected.");
  return db.collection(name);
}

async function ensureSettings(){
  const ref = col("settings").doc("access");
  const snap = await ref.get();
  if(!snap.exists){
    await ref.set(SEED_SETTINGS);
    return SEED_SETTINGS;
  }
  return snap.data();
}

function subscribe(name, onChange){
  return col(name).onSnapshot(snap=>{
    const items = [];
    snap.forEach(d=>items.push({ id:d.id, ...d.data() }));
    onChange(items);
  }, err=>{
    console.warn("Firestore subscription failed for '" + name + "':", err);
    state.firebaseError = state.firebaseError || err.message;
    render();
  });
}

// Without Firebase connected, `state.clients`/`tasks`/`timeEntries` would
// otherwise never change (they're normally only ever updated by the Firestore
// onSnapshot listeners in boot()), so every write would silently vanish and
// e.g. a freshly-created client could never be found. Mirror the write into
// the matching in-memory array so local/demo mode is actually usable —
// it still won't survive a page reload until real Firebase config is in place.
function upsertLocal(name, id, data){
  const arr = state[name];
  if(!Array.isArray(arr)) return;
  const idx = arr.findIndex(x=>x.id===id);
  if(idx>=0) arr[idx] = { ...arr[idx], ...data, id };
  else arr.push({ id, ...data });
}
function removeLocal(name, id){
  const arr = state[name];
  if(!Array.isArray(arr)) return;
  state[name] = arr.filter(x=>x.id!==id);
}
function upsert(name, id, data){
  if(!db){
    console.warn("Firebase not connected — saving locally only (won't survive a reload):", name, id, data);
    upsertLocal(name, id, data);
    render();
    return Promise.resolve();
  }
  return col(name).doc(id).set(data, { merge:true }).catch(err=>{
    console.warn("Write to '" + name + "' failed:", err);
    alert("This didn't save — " + err.message + "\n\nCheck your connection and try again. If it keeps happening, tell Kaylan.");
  });
}
function remove(name, id){
  if(!db){
    console.warn("Firebase not connected — deleting locally only:", name, id);
    removeLocal(name, id);
    render();
    return Promise.resolve();
  }
  return col(name).doc(id).delete().catch(err=>{
    console.warn("Delete from '" + name + "' failed:", err);
  });
}
function newId(prefix){
  return prefix + "_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);
}

// ---- 5. Boot ----
// Demo/test data for local-only mode (no Firebase configured yet) — lets you
// click through every feature (tasks, time entries, hours-used tiers, the
// weekly/period reports, the client portal) without hand-building a client
// first. Timestamps are relative to "now" so it always lands inside the
// current week/pay period/billing month, whenever it's actually opened.
// Only ever runs when Firebase isn't connected, so it can never touch real data.

  const client = {

    portalCode: "demo123",
    referredBy: heidiId,
    termType: "3month",
    termStartDate: new Date(now - 24*60*3600000).toISOString().slice(0,10),
    clientStatus: "active",
    referralPayoutsPaidCount: 1,

    ],

      { label:"Client's birthday", date:"1990-07-25" },
      { label:"Anniversary", date:"2015-09-10" }
    ],
    vendors: [ { name:"Green Clean Co.", service:"House cleaning", lastService: hoursAgo(9*24).slice(0,10), frequencyDays:30 } ],
    inspections: [ { name:"HVAC inspection", nextDue: new Date(now + 10*24*3600000).toISOString().slice(0,10) } ],
    profile: {
      serviceType: "both",
      phone: "555-123-4567",
      emergencyContact: "Jamie Doe — 555-987-6543",
      homeAddress: "123 Demo Lane, Austin, TX",
      familyMembers: [ { name:"Alex Jr.", age:"8" }, { name:"Riley", age:"5" } ],
      homeAccess: "Hidden key under the third flowerpot on the porch. Alarm code: 4821.",
      topPriorities: ["Weekly grocery restock","Inbox triage","Vendor coordination"],
      weeklySchedule: "Mon/Wed/Fri mornings preferred for home visits.",
      petInfo: "One dog (Biscuit) — feed 2x daily, leash walks only.",
      specialPreferences: "Prefers text over email. Organic groceries only.",
      communicationPreference: "Text — responds fastest 9am–5pm.",
      budgetNotes: "Pre-approved up to $150/week for groceries without checking in.",
      offLimits: "Do not rearrange the home office.",
      officeAddress: "456 Business Blvd, Austin, TX",
      officeHours: "9am–5pm, Mon–Fri",
      teamMembers: "Jordan (Ops), Casey (Sales)",

    }

  const tasks = [
    { id:"task_demo_1", title:"Guest messaging", clientId, status:"Done", category:"Home",
      assignees:[heidiId], subtasks:[{text:"Reply to guest inquiries",done:true},{text:"Update FAQ doc",done:true}],
      discussion:[], description:"Handled guest messaging across platforms.", completedAt: hoursAgo(48) },
    { id:"task_demo_2", title:"Website — Creation", clientId, status:"Done", category:"Business",
      assignees:[heidiId], subtasks:[], discussion:[], description:"Worked on website creation.", completedAt: hoursAgo(60) },
    { id:"task_demo_3", title:"Handyman — Phone call", clientId, status:"Done", category:"Home",
      assignees:[heidiId], subtasks:[], discussion:[], description:"Phone call with handyman.", completedAt: hoursAgo(30) },
    { id:"task_demo_4", title:"Ongoing — Platform familiarization & value add", clientId, status:"In progress", category:"Business",
      assignees:[heidiId], subtasks:[{text:"Shadow onboarding call",done:true},{text:"Document new SOP",done:false}],
      discussion:[], description:"Continuing to deepen knowledge of the guest messaging platform and actively identifying additional ways to support operations and add value where possible.",

    { id:"task_demo_5", title:"Grocery restock", clientId, status:"To do", category:"Home",

    { id:"task_demo_reset", title:"Home reset — beds, kitchen, laundry", clientId, status:"Done", category:"Home",

    { id:"te_demo_6", taskId:"task_demo_reset", assistantId:heidiId, clientId, clockIn: hoursAgo(20), clockOut: hoursAgo(15) }

  return { clients:[client], tasks, timeEntries };
}

async function boot(){
  // Render immediately so the UI is never blank while Firestore connects
  // (or fails to, if firebaseConfig hasn't been filled in yet, or the SDK
  // couldn't load at all).
  render();

  if(!FIREBASE_AVAILABLE || !FIREBASE_CONFIGURED){
    console.warn("Running with local seed data only — Firebase is either unavailable or still using placeholder config. Nothing will persist.");
    if(state.clients.length===0){
      const demo = seedDemoData();
      state.clients = demo.clients;
      state.tasks = demo.tasks;
      state.timeEntries = demo.timeEntries;
    }
  } else {
    try{
      state.settings = await ensureSettings();
    }catch(err){
      console.warn("Could not load settings from Firestore, using local seed data:", err);
      state.firebaseError = state.firebaseError || err.message;
    }
    // Data still updates in the background even with a modal open (so it's
    // fresh the moment it closes) -- it just skips forcing a re-render while
    // one's open, since a background sync mid-form-fill would otherwise wipe
    // out anything typed into a field that's since been tabbed away from
    // (those values only live in the DOM until Save, nothing holds them
    // through a full re-render except the currently-focused field).
    subscribe("clients", items=>{ state.clients = items; if(!state.modal) render(); });
    subscribe("tasks", items=>{ state.tasks = items; if(!state.modal) render(); });
    subscribe("timeEntries", items=>{ state.timeEntries = items; if(!state.modal) render(); });
    watchOrientationSync();
  }

  render();
  setInterval(()=>{ if(!state.modal) render(); }, 60000); // refresh live timers every minute, but not mid-form
  setInterval(checkClockReminders, 30*60*1000); // 30-min reminder
}

// ---- 6. Orientation sync (existing integration, preserved) ----
function watchOrientationSync(){
  db.collection("orientationClients").where("done.visit","==",true)
    .onSnapshot(snap=>{
      snap.docChanges().forEach(change=>{
        if(change.type === "added" || change.type === "modified"){
          const data = change.doc.data();
          const clientName = data.clientName || data.name;
          const match = state.clients.find(c => c.name && clientName &&
            c.name.toLowerCase() === clientName.toLowerCase());
          if(match){
            const note = {
              id: newId("note"),
              text: "Home orientation completed (synced from onboarding dashboard).",
              date: new Date().toISOString(),
              source: "orientation-sync"
            };
            const notes = match.notes || [];
            if(!notes.some(n=>n.source==="orientation-sync")){
              upsert("clients", match.id, { notes: [...notes, note] });
            }
          }
        }
      });
    }, err=>console.warn("orientation sync listener error", err));
}

// ---- 7. Time tracking ----
function activeEntryFor(assistantId){
  return state.timeEntries.find(t => t.assistantId === assistantId && !t.clockOut);
}
function clockIn(taskId, assistantId, note){
  const existing = activeEntryFor(assistantId);
  if(existing){ alert("You're already clocked in on another task. Clock out first."); return; }
  const task = state.tasks.find(t=>t.id===taskId);
  const entry = {
    id: newId("te"),
    taskId, assistantId,
    clientId: task ? task.clientId : INTERNAL_CLIENT_ID,
    clockIn: new Date().toISOString(),
    clockOut: null,
    note: note || ""
  };
  upsert("timeEntries", entry.id, entry);
}
// A standing task under Internal / Modern Co. so anyone can clock straight
// into general admin work without first creating a one-off task for it.
const GENERAL_ADMIN_TASK_ID = "task_general_admin";
function clockInAdminWork(assistantId){
  const note = prompt("What are you clocking in for? (required so Kaylan knows what this admin time covers)", "");
  if(!note || !note.trim()){ alert("You need to enter a description before clocking in for admin work."); return; }
  if(!state.tasks.find(t=>t.id===GENERAL_ADMIN_TASK_ID)){
    upsert("tasks", GENERAL_ADMIN_TASK_ID, {
      title: "General Admin Work", clientId: INTERNAL_CLIENT_ID, status: "In progress",
      category: "Business", assignees: [], subtasks: [], discussion: [], description: ""
    });
  }
  clockIn(GENERAL_ADMIN_TASK_ID, assistantId, note.trim());
}
function deleteTimeEntry(entryId){
  if(!confirm("Delete this time entry? This can't be undone.")) return;
  remove("timeEntries", entryId);
}
function toggleFlagTimeEntry(entryId){
  const entry = state.timeEntries.find(e=>e.id===entryId);
  if(!entry) return;
  if(entry.flagged){
    upsert("timeEntries", entryId, { flagged:false, flagNote:"" });
    return;
  }
  const reason = prompt("Why are you flagging this entry for review? (optional)", "");
  upsert("timeEntries", entryId, { flagged:true, flagNote: reason ? reason.trim() : "" });
}
function clockOut(entryId, editedTime){
  // Flag whenever a clock-out time was typed in rather than captured live —
  // clocking in is always real-time already (see clockIn()), so this is the
  // only point a manually-entered time can slip in, and admin wants visibility
  // into that rather than it blending in with real-time clock-outs.
  upsert("timeEntries", entryId, { clockOut: editedTime || new Date().toISOString(), clockOutManual: !!editedTime });
}
function entryDurationHours(entry){
  const start = new Date(entry.clockIn);
  const end = entry.clockOut ? new Date(entry.clockOut) : new Date();
  return (end - start) / 3600000;
}
function hoursForTask(taskId){
  return state.timeEntries.filter(e=>e.taskId===taskId).reduce((s,e)=>s+entryDurationHours(e),0);
}
function isStale(entry){
  return !entry.clockOut && entryDurationHours(entry) > 8;
}
function checkClockReminders(){
  if(!("Notification" in window)) return;
  const entry = state.currentAssistant && activeEntryFor(state.currentAssistant.id);
  if(entry && Notification.permission === "granted"){
    new Notification("Still clocked in", {
      body: "You've been clocked in for " + entryDurationHours(entry).toFixed(1) + " hours."
    });
  }
}

// ---- 8. Billing period + tier alerts ----
function currentBillingPeriod(client){
  if(!client.renewalDate) return null;
  const anchor = new Date(client.renewalDate);
  const cycle = client.cycleType || "monthly";
  const now = new Date();
  let periodStart = new Date(anchor);
  const advance = (d)=>{
    const nd = new Date(d);
    if(cycle==="biweekly") nd.setDate(nd.getDate()+14);
    else if(cycle==="quarterly") nd.setMonth(nd.getMonth()+3);
    else if(cycle==="annual") nd.setFullYear(nd.getFullYear()+1);
    else nd.setMonth(nd.getMonth()+1); // monthly (default)
    return nd;
  };
  while(advance(periodStart) <= now) periodStart = advance(periodStart);
  const periodEnd = advance(periodStart);
  return { start: periodStart, end: periodEnd };
}
// A one-off grant of extra hours into a specific upcoming period (e.g. "let
// this client carry over 6.5 unused hours into their period starting 7/18")
// — tied to that exact period's start date so it doesn't silently keep
// applying to every period after that one.
function effectivePackageHours(client){
  const base = client.packageHours || 0;
  if(!client.rolloverHours || !client.rolloverPeriodStart) return base;
  const period = currentBillingPeriod(client);
  if(!period) return base;
  const periodStartDate = period.start.toISOString().slice(0,10);
  return periodStartDate === client.rolloverPeriodStart ? base + client.rolloverHours : base;
}
function hoursUsed(clientId){
  const client = state.clients.find(c=>c.id===clientId);
  const period = client ? currentBillingPeriod(client) : null;
  return state.timeEntries
    .filter(t=>t.clientId===clientId)
    .filter(t=> !period || (new Date(t.clockIn) >= period.start && new Date(t.clockIn) < period.end))
    .reduce((sum,t)=> sum + entryDurationHours(t), 0);
}
function tierAlert(client){
  const used = hoursUsed(client.id);
  const pkg = effectivePackageHours(client);
  if(!pkg) return null;
  const pct = (used / pkg) * 100;
  const hit = TIER_THRESHOLDS.filter(t=>pct>=t).pop();
  if(!hit) return null;
  const level = hit>=100 ? "danger" : hit>=90 ? "danger" : hit>=75 ? "warn" : "warn";
  const overage = overageFor(client);
  return { pct: Math.round(pct), used: used.toFixed(1), pkg, level,
    text: client.name + " is at " + Math.round(pct) + "% of package (" + used.toFixed(1) + "/" + pkg + " hrs)" +
      (overage.overHours>0 ? " — $" + overage.amount.toFixed(2) + " overage" : "") };
}
// Client-to-client referral program (distinct from the assistant referral
// payout above): a client who refers another client earns 20% off one month
// once that referral signs a 3-month+ term (not still in the pilot).
function clientReferralDiscountStatus(client){
  const referredClients = state.clients.filter(c=>c.referredByClientId===client.id);
  const qualified = referredClients.filter(c=>c.termType && c.termType!=="pilot");
  const redeemed = client.referralDiscountsRedeemed || 0;
  return { referredClients, earned: qualified.length, redeemed, available: Math.max(0, qualified.length - redeemed) };
}
function redeemClientReferralDiscount(clientId){
  const client = state.clients.find(c=>c.id===clientId);
  if(!client) return;
  upsert("clients", clientId, { referralDiscountsRedeemed: (client.referralDiscountsRedeemed||0) + 1 });
}
function overageFor(client){
  const used = hoursUsed(client.id);
  const pkg = effectivePackageHours(client);
  const overHours = Math.max(0, used - pkg);
  return { overHours, amount: overHours * OVERAGE_RATE };
}

// ---- 8b. Payroll period + dashboard helpers ----
// Payroll runs semi-monthly: the 1st–14th, and the 15th–end of month.
function currentPayrollPeriod(refDate){
  const now = refDate || new Date();
  const year = now.getFullYear(), month = now.getMonth();
  if(now.getDate() <= 14){
    return { start: new Date(year, month, 1), end: new Date(year, month, 15) };
  }
  return { start: new Date(year, month, 15), end: new Date(year, month+1, 1) };
}
function hoursInPeriod(entries, period){
  return entries
    .filter(e => !period || (new Date(e.clockIn) >= period.start && new Date(e.clockIn) < period.end))
    .reduce((sum,e)=> sum + entryDurationHours(e), 0);
}
function hoursForClientInPeriod(clientId, period){
  return hoursInPeriod(state.timeEntries.filter(t=>t.clientId===clientId), period);
}
// period.end is an exclusive boundary (midnight of the day AFTER the period)
// so it's one day past the period's actual last day — always subtract 1ms
// before formatting for display, or "7/15–7/31" reads as "7/15–8/1".
function formatPeriodRange(period){
  if(!period) return "";
  const displayEnd = new Date(period.end.getTime()-1);
  return period.start.toLocaleDateString() + " – " + displayEnd.toLocaleDateString();
}
function assistantName(id){
  const a = state.settings.assistants.find(x=>x.id===id);
  return a ? a.name : id;
}

// ---- 8c. Weekly client report (Saturday through Friday) ----
function currentReportWeek(refDate){
  const now = refDate || new Date();
  const daysSinceFriday = (now.getDay() - 5 + 7) % 7; // Friday = 5
  const friday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - daysSinceFriday);
  const start = new Date(friday.getFullYear(), friday.getMonth(), friday.getDate() - 6); // Saturday before
  const end = new Date(friday.getFullYear(), friday.getMonth(), friday.getDate() + 1); // exclusive, midnight after Friday
  return { start, end, friday };
}
function formatHoursMinutes(hrs){
  const totalMinutes = Math.round(Math.max(0,hrs) * 60);
  return Math.floor(totalMinutes/60) + "h " + (totalMinutes % 60) + "m";
}
// kind: "week" (the Friday recap, Saturday–Friday) or "period" (the client's
// full current billing cycle, e.g. their 30-day membership period) — both
// share the same layout, just a different task-completion window and labels.
function buildClientReport(client, window, kind){
  const tasks = state.tasks.filter(t=>t.clientId===client.id);
  const inProgress = tasks.filter(t=>t.status==="In progress");
  const completed = tasks.filter(t=>{
    if(t.status!=="Done" || !t.completedAt) return false;
    const d = new Date(t.completedAt);
    return d >= window.start && d < window.end;
  });
  const used = hoursUsed(client.id);
  const pkg = effectivePackageHours(client);
  return {
    kind, client, week: window, inProgress, completed,
    hoursUsed: used, packageHours: pkg,
    hoursRemaining: Math.max(0, pkg - used),
    billingPeriod: currentBillingPeriod(client),
    signerName: "The Modern Concierge Team"
  };
}

function clientReportPlainText(report){
  const { client, week, inProgress, completed } = report;
  const isPeriod = report.kind === "period";
  const fmt = d => new Date(d).toLocaleDateString();
  const fmtShort = d => (d.getMonth()+1) + "/" + d.getDate();
  const noun = isPeriod ? "End-of-Period Recap" : "End-of-Week Recap";
  const completedWord = isPeriod ? "this period" : "this week";
  const lines = [];
  lines.push(noun + " — " + client.name);
  lines.push(fmt(week.start) + " – " + fmt(new Date(week.end.getTime()-1)));
  lines.push("");
  lines.push(("COMPLETED " + completedWord).toUpperCase() + ":");
  lines.push(...(completed.length ? completed.map(t=>"- "+t.title+": "+(t.description||t.title)) : ["(nothing completed " + completedWord + ")"]));
  lines.push("");
  lines.push("IN PROGRESS:");
  lines.push(...(inProgress.length ? inProgress.map(t=>"- "+t.title+": "+(t.description||t.title)) : ["(nothing in progress)"]));
  lines.push("");
  lines.push("MEMBERSHIP HOURS: " + formatHoursMinutes(report.hoursUsed) + " used / " + formatHoursMinutes(report.hoursRemaining) + " remaining / " + report.packageHours + "h total.");
  if(report.billingPeriod) lines.push("Billing period ends " + fmtShort(report.billingPeriod.end) + ".");
  lines.push("");
  lines.push("Please don't hesitate to reach out should you have any questions or require additional information. We appreciate your continued trust and partnership.");
  lines.push("");
  lines.push(report.signerName);
  lines.push("The Modern Concierge");
  return lines.join("\n");
}
// ---- 8d. CSV export ----
function csvEscape(val){
  const s = String(val==null ? "" : val);
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
}
function downloadCsv(filename, rows){
  const csv = rows.map(row=>row.map(csvEscape).join(",")).join("\n");
  const blob = new Blob([csv], { type:"text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function exportPayrollCsv(){
  const period = currentPayrollPeriod();
  const rows = [["Assistant","Hours worked","Hourly rate","Amount owed","Status","Payroll period"]];
  state.settings.assistants.forEach(a=>{
    const entries = state.timeEntries.filter(e=>e.assistantId===a.id);
    const hrs = hoursInPeriod(entries, period);
    const rate = a.hourlyRate || 0;
    rows.push([
      a.name + (a.active===false ? " (former)" : ""),
      hrs.toFixed(2), rate.toFixed(2), (hrs*rate).toFixed(2),
      a.active===false ? "former employee" : "active",
      formatPeriodRange(period)
    ]);
  });
  downloadCsv("payroll-" + new Date().toISOString().slice(0,10) + ".csv", rows);
}
function exportTimeEntriesCsv(){
  const mineAll = state.currentAssistant ? state.timeEntries.filter(t=>t.assistantId===state.currentAssistant.id) : state.timeEntries;
  const period = timeFilterPeriod();

    .filter(e => !period || (new Date(e.clockIn) >= period.start && new Date(e.clockIn) < period.end))
    .filter(e => assistantFilterId==="all" || e.assistantId===assistantFilterId);

    rows.push([

      e.clockOut ? new Date(e.clockOut).toLocaleString() : "(still clocked in)",

      e.clockOutManual ? "yes" : "no",
      e.clientId===INTERNAL_CLIENT_ID ? "yes" : "no"
    ]);
  });
  downloadCsv("time-entries-" + new Date().toISOString().slice(0,10) + ".csv", rows);
}

// ---- 8e. Payroll report (per assistant, same branded format) ----
function buildPayrollReport(assistant, period){
  const entries = state.timeEntries.filter(e=>e.assistantId===assistant.id);
  const inPeriod = entries.filter(e => new Date(e.clockIn) >= period.start && new Date(e.clockIn) < period.end);
  const totalHours = inPeriod.reduce((s,e)=>s+entryDurationHours(e),0);
  const byClientMap = {};
  inPeriod.forEach(e=>{
    const name = e.clientId===INTERNAL_CLIENT_ID ? "Internal / Modern Co." : (state.clients.find(c=>c.id===e.clientId)?.name || "Unknown client");
    byClientMap[name] = (byClientMap[name]||0) + entryDurationHours(e);
  });
  const byClient = Object.entries(byClientMap).map(([name,hours])=>({name,hours})).sort((a,b)=>b.hours-a.hours);
  const rate = assistant.hourlyRate || 0;
  return { assistant, period, totalHours, byClient, rate, amountOwed: totalHours*rate };
}

function payrollReportPlainText(report){
  const { assistant, period, byClient } = report;
  const fmt = d => new Date(d).toLocaleDateString();
  const lines = [];
  lines.push("Payroll Recap — " + assistant.name);
  lines.push(fmt(period.start) + " – " + fmt(new Date(period.end.getTime()-1)));
  lines.push("");
  lines.push("HOURS BY CLIENT:");
  lines.push(...(byClient.length ? byClient.map(c=>"- "+c.name+": "+formatHoursMinutes(c.hours)) : ["(no hours logged this period)"]));
  lines.push("");
  lines.push("HOURS WORKED: " + formatHoursMinutes(report.totalHours));
  lines.push("HOURLY RATE: $" + report.rate.toFixed(2));
  lines.push("TOTAL PAY: $" + report.amountOwed.toFixed(2));
  lines.push("");
  lines.push("Questions about your hours or pay this period, just ask.");
  lines.push("");
  lines.push("The Modern Concierge");
  return lines.join("\n");
}
function downloadPayrollReport(assistantId){
  const assistant = state.settings.assistants.find(a=>a.id===assistantId);
  if(!assistant) return;
  const period = currentPayrollPeriod();
  const report = buildPayrollReport(assistant, period);
  const blob = new Blob([payrollReportHtml(report)], { type: "text/html" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = assistant.name.replace(/[^a-z0-9]+/gi,"-") + "-payroll-" + new Date().toISOString().slice(0,10) + ".html";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function emailPayrollReport(assistantId){
  const assistant = state.settings.assistants.find(a=>a.id===assistantId);
  if(!assistant) return;
  if(!assistant.email){ alert(assistant.name + " doesn't have an email on file yet — add one on the Team tab first."); return; }
  const period = currentPayrollPeriod();
  const report = buildPayrollReport(assistant, period);
  const subject = encodeURIComponent("Your Payroll Recap — " + formatPeriodRange(period));
  const body = encodeURIComponent(payrollReportPlainText(report));
  window.location.href = "mailto:" + assistant.email + "?subject=" + subject + "&body=" + body;
}

// Active assistants, plus any former employee already tied to this record —
// so an existing assignment to someone who's left stays visible for context.
function assignableAssistants(alreadyIds){
  const already = new Set(alreadyIds||[]);
  return state.settings.assistants.filter(a=>a.active!==false || already.has(a.id));
}
// A client's package hours are quoted on their own (monthly/quarterly/annual)
// billing cycle, not on the semi-monthly payroll calendar. To compare what a
// client paid for against what got clocked in a given payroll period, prorate
// their package down to a per-payroll-period rate (2 payroll periods/month).
// A biweekly cycle (14 days) is roughly the same length as one payroll
// period already, so it needs no further proration (divisor 1).
function payrollProrationDivisor(cycle){
  if(cycle === "biweekly") return 1;
  if(cycle === "quarterly") return 6;
  if(cycle === "annual") return 24;
  return 2; // monthly (default)
}
function expectedHoursPerPayrollPeriod(client){
  const pkg = client.packageHours || 0;
  return pkg / payrollProrationDivisor(client.cycleType || "monthly");
}
// Same proration logic as hours, applied to package price — packagePrice is
// quoted on the client's own billing cycle, not the payroll calendar.
function expectedRevenuePerPayrollPeriod(client){
  const price = client.packagePrice || 0;
  const divisor = payrollProrationDivisor(client.cycleType || "monthly");
  // Overage billing is real revenue too — this also covers as-needed clients
  // (packagePrice 0, packageHours 0) whose entire usage bills as "overage."
  return (price / divisor) + (overageFor(client).amount / divisor);
}
function internalHoursStatus(period){
  const used = hoursForClientInPeriod(INTERNAL_CLIENT_ID, period);
  const budget = state.settings.internalHoursBudget || 0;
  if(!budget) return { used, budget:0, pct:null, level:null };
  const pct = (used/budget)*100;
  const hit = TIER_THRESHOLDS.filter(t=>pct>=t).pop();
  const level = !hit ? "ok" : hit>=90 ? "danger" : "warn";
  return { used, budget, pct: Math.round(pct), level };
}
function taskCreatedDate(task){
  if(task.createdAt){
    const d = new Date(task.createdAt);
    if(!isNaN(d.getTime())) return d;
  }
  const m = /_(\d{10,})_/.exec(task.id||"");
  return m ? new Date(parseInt(m[1],10)) : null;
}
// ---- Referral tracking ----
// Current program: $100/month to the referring assistant for up to 12
// months, but only once the client signs on past their 30-day pilot into a
// paid term — and it stops accruing the moment the client cancels, even if
// that's mid-year.
function referralPayoutStatus(client){
  if(!client.referredBy) return null;
  const assistant = state.settings.assistants.find(a=>a.id===client.referredBy);
  if(!assistant) return null;
  if(!client.termType || client.termType==="pilot"){
    return { assistant, eligible:false, reason:"Still in the 30-day pilot — payouts start once they sign on past it." };
  }
  if(!client.termStartDate){
    return { assistant, eligible:false, reason:"Set a term start date on the Membership tab to calculate payout months." };
  }
  const start = new Date(client.termStartDate);
  const stoppedAccruing = client.clientStatus && client.clientStatus!=="active";
  const asOf = (stoppedAccruing && client.cancelledDate) ? new Date(client.cancelledDate) : new Date();
  let monthsElapsed = (asOf.getFullYear()-start.getFullYear())*12 + (asOf.getMonth()-start.getMonth()) + 1;
  if(asOf.getDate() < start.getDate()) monthsElapsed--;
  monthsElapsed = Math.max(0, Math.min(12, monthsElapsed));
  const paid = client.referralPayoutsPaidCount || 0;
  return {
    assistant, eligible:true, monthsElapsed, paid,
    owed: Math.max(0, monthsElapsed - paid),
    stoppedEarly: stoppedAccruing,
    monthlyAmount: 100
  };
}
function daysOpen(task){
  const created = taskCreatedDate(task);
  return created ? (Date.now() - created.getTime())/86400000 : null;
}
function overdueTasks(){
  return state.tasks
    .filter(t=>t.status!=="Done")
    .map(t=>({ task:t, days: daysOpen(t) }))
    .filter(x=>x.days!==null && x.days>=7)
    .sort((a,b)=>b.days-a.days);
}
// Distinct from overdueTasks() above: that's "been sitting open a while"
// (staleness); this is "missed an actual deadline" — different signals.
// At-risk: no billable hours this period AND no completed task in the last
// 30 days. Either alone can be normal (a slow week); both together suggests
// the client's quietly gone dormant.
function isAtRiskClient(client){
  if(client.clientStatus && client.clientStatus!=="active") return false; // already known-paused/cancelled, not a surprise risk
  const used = hoursUsed(client.id);
  if(used > 0) return false;
  const thirtyDaysAgo = Date.now() - 30*24*3600000;
  const recentCompleted = state.tasks.some(t=>t.clientId===client.id && t.status==="Done" && t.completedAt && new Date(t.completedAt).getTime() >= thirtyDaysAgo);
  return !recentCompleted;
}
function tasksPastDueDate(){
  const now = new Date();
  return state.tasks
    .filter(t=>t.status!=="Done" && t.dueDate)
    .map(t=>({ task:t, daysLate: -daysUntil(new Date(t.dueDate), now) }))
    .filter(x=>x.daysLate > 0)
    .sort((a,b)=>b.daysLate-a.daysLate);
}

// ---- 8e. Upcoming/overdue reminders (special dates, vendors, inspections) ----
function nextYearlyOccurrence(dateStr, now){
  const d = new Date(dateStr);
  if(isNaN(d.getTime())) return null;
  const todayMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  let next = new Date(now.getFullYear(), d.getMonth(), d.getDate());
  if(next < todayMid) next = new Date(now.getFullYear()+1, d.getMonth(), d.getDate());
  return next;
}
function daysUntil(date, now){
  const todayMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((date.getTime() - todayMid.getTime())/86400000);
}
function upcomingReminders(windowDays){
  windowDays = windowDays || 14;
  const now = new Date();
  const results = [];
  state.clients.filter(c=>c.id!==INTERNAL_CLIENT_ID).forEach(client=>{
    (client.specialDates||[]).forEach(d=>{
      const next = nextYearlyOccurrence(d.date, now);
      if(!next) return;
      const days = daysUntil(next, now);
      if(days <= windowDays) results.push({ client, type:"Special date", label:d.label, date:next, days });
    });
    (client.vendors||[]).forEach(v=>{
      if(!v.lastService || !v.frequencyDays) return;
      const due = new Date(new Date(v.lastService).getTime() + v.frequencyDays*86400000);
      const days = daysUntil(due, now);
      if(days <= windowDays) results.push({ client, type:"Vendor service", label: v.name + " — " + v.service, date:due, days });
    });
    (client.inspections||[]).forEach(ins=>{
      if(!ins.nextDue) return;
      const due = new Date(ins.nextDue);
      const days = daysUntil(due, now);
      if(days <= windowDays) results.push({ client, type:"Inspection", label: ins.name, date:due, days });
    });
  });
  return results.sort((a,b)=>a.days-b.days);
}

// ---- Term end + cancellation notice deadlines ----
// Per the Services Agreement §2: written notice is required this many days
// before the term ends, or it auto-renews and the card on file gets charged.
const TERM_LENGTH_DAYS = { pilot:30, "3month":90, "12month_new":365, "12month_renewal":365 };
const TERM_NOTICE_DAYS = { pilot:7, "3month":30, "12month_new":60, "12month_renewal":60 };
const TERM_LABELS = { pilot:"One Month Pilot", "3month":"Three Month Term", "12month_new":"Twelve Month Term (New)", "12month_renewal":"Twelve Month Term (Renewal)" };
function termEndDate(client){
  // A manual override always wins — the 30/90/365-day formula is a default,
  // not every real contract lines up with it exactly.
  if(client.termEndOverride) return new Date(client.termEndOverride);
  if(!client.termStartDate || !client.termType || !TERM_LENGTH_DAYS[client.termType]) return null;
  return new Date(new Date(client.termStartDate).getTime() + TERM_LENGTH_DAYS[client.termType]*24*3600000);
}
function noticeDeadline(client){
  if(client.noticeDeadlineOverride) return new Date(client.noticeDeadlineOverride);
  const end = termEndDate(client);
  if(!end) return null;
  return new Date(end.getTime() - (TERM_NOTICE_DAYS[client.termType]||0)*24*3600000);
}
function upcomingNoticeDeadlines(windowDays){
  // windowDays === null means "no limit" — every active client with term
  // data, not just ones whose deadline happens to be imminent.
  const now = new Date();
  return state.clients
    .filter(c=>c.id!==INTERNAL_CLIENT_ID && (!c.clientStatus || c.clientStatus==="active"))
    .map(client=>{
      const deadline = noticeDeadline(client);
      if(!deadline) return null;
      const period = currentBillingPeriod(client);
      return { client, deadline, termEnd: termEndDate(client), periodEnd: period ? period.end : null, days: daysUntil(deadline, now) };
    })
    .filter(x=>x && (windowDays===null || x.days<=windowDays))
    .sort((a,b)=>a.days-b.days);
}

const app = document.getElementById("app");

function render(){
  // A full re-render happens constantly in the background (the 60s live-timer
  // tick, any Firestore snapshot from anyone's activity) and always rebuilds
  // the whole page from `state`. Since a text field's typed characters don't
  // land in `state` until it's blurred (onchange), a refresh mid-keystroke
  // would otherwise wipe back to the last-saved value. Capture + restore
  // whatever's actively focused so typing survives a background refresh.
  const active = document.activeElement;
  const preserving = active && (active.tagName === "TEXTAREA" || (active.tagName === "INPUT" && (active.type === "text" || active.type === "number" || active.type === "email" || active.type === "search")));
  const preserved = preserving ? { id: active.id, value: active.value, selStart: active.selectionStart, selEnd: active.selectionEnd } : null;

  if(state.view === "login") renderLogin();
  else if(state.role === "client") renderClientPortal();
  else renderAppShell();

  if(preserved && preserved.id){
    const el = document.getElementById(preserved.id);
    if(el){
      el.value = preserved.value;
      el.focus();
      try{ el.setSelectionRange(preserved.selStart, preserved.selEnd); }catch(e){}
    }
  }
}

// A "Pending approval" task is a client's request that a specific assistant
// needs to look at and accept or decline — it is NOT an admin sign-off queue.
// This card is shared by the admin dashboard (sees every pending request) and
// the team dashboard (sees only requests assigned to that assistant).
function renderClientRequestsCard(tasks, opts){
  opts = opts || {};
  if(!tasks.length) return "";
  return `
    <div class="card">
      <h3>${opts.title || "Client requests awaiting review"}</h3>
      ${tasks.map(t=>{
        const client = state.clients.find(c=>c.id===t.clientId);
        return `<div class="list-item" style="flex-direction:column;align-items:stretch;gap:6px;">
          <div class="flex-between">
            <div>
              <span class="badge ${t.category==='Home'?'home':'business'}">${t.category||'—'}</span>
              <strong>${t.title}</strong>
              <span class="small">(${client?client.name:'Internal'})</span>
              ${opts.showAssistant ? `<span class="small"> · ${(t.assignees||[]).map(assistantName).join(', ') || 'unassigned'}</span>` : ""}
            </div>
            <div style="display:flex;gap:6px;">
              <button onclick="acceptClientRequest('${t.id}')">Accept</button>
              <button class="danger" onclick="declineClientRequest('${t.id}')">Decline</button>
            </div>
          </div>
          ${t.clientRequestNote ? `<div class="small">&ldquo;${t.clientRequestNote}&rdquo;</div>` : ""}
          ${t.requestImage ? `<img src="${t.requestImage}" style="max-width:160px;max-height:160px;border-radius:8px;cursor:pointer;" onclick="openTaskEditor('${t.id}',null)">` : ""}
        </div>`;
      }).join("")}
    </div>
  `;
}
function acceptClientRequest(taskId){
  upsert("tasks", taskId, { status: "To do" });
}
function declineClientRequest(taskId){
  const task = state.tasks.find(t=>t.id===taskId);
  if(!task) return;
  const reason = prompt("Reason for declining (shared with the client in their activity log):", "");
  if(reason === null) return;
  const client = state.clients.find(c=>c.id===task.clientId);
  if(client){
    const notes = client.notes || [];
    upsert("clients", client.id, { notes: [...notes, {
      id: newId("note"),
      text: "Your request \"" + task.title + "\" couldn't be taken on" + (reason.trim() ? ": " + reason.trim() : "."),
      date: new Date().toISOString(),
      source: "task-declined"
    }] });
  }
  remove("tasks", taskId);
}

function renderTeamDashboard(){
  const myClientIds = new Set(state.clients.filter(c=>(c.assistantIds||[]).includes(state.currentAssistant?.id)).map(c=>c.id));
  const alerts = state.clients.filter(c=>myClientIds.has(c.id)).map(tierAlert).filter(Boolean);
  const myEntry = state.currentAssistant && activeEntryFor(state.currentAssistant.id);
  const myOpenTasks = state.tasks.filter(t=>t.status!=="Done" && (t.assignees||[]).includes(state.currentAssistant?.id));
  const myPending = state.tasks.filter(t=>t.status==="Pending approval" && (t.assignees||[]).includes(state.currentAssistant?.id));

  // Week ahead: anything flagged priority, plus anything due in the next 7
  // days (or already overdue) — sorted priority-first, then by due date.
  const now = new Date();
  const weekAhead = myOpenTasks.filter(t=>{
    if(t.priority) return true;
    if(!t.dueDate) return false;
    return daysUntil(new Date(t.dueDate), now) <= 7;
  }).sort((a,b)=>{
    if(!!b.priority !== !!a.priority) return b.priority ? 1 : -1;
    if(!a.dueDate && !b.dueDate) return 0;
    if(!a.dueDate) return 1;
    if(!b.dueDate) return -1;
    return new Date(a.dueDate) - new Date(b.dueDate);
  });

  // Recent comments across everything assigned to me, newest first.
  const recentComments = myOpenTasks
    .flatMap(t => (t.discussion||[]).map(d => ({ ...d, task: t })))
    .sort((a,b)=> new Date(b.date) - new Date(a.date))
    .slice(0,6);

  return `
    <h2>Dashboard</h2>
    ${renderClientRequestsCard(myPending, { title: "Requests awaiting your review" })}
    ${myEntry ? `
      <div class="card">
        <div class="flex-between">
          <div>
            <div class="small">Currently clocked in</div>
            <strong>${(state.tasks.find(t=>t.id===myEntry.taskId)||{}).title || "Task"}</strong>
          </div>
          <div class="timer-pill">⏱ ${entryDurationHours(myEntry).toFixed(2)} hrs</div>
        </div>
        ${isStale(myEntry) ? `<div class="alert danger" style="margin-top:8px;">This clock has been running over 8 hours — check if it's stale.</div>` : ""}
        <button style="margin-top:10px;" onclick="doClockOut('${myEntry.id}')">Clock out</button>
      </div>` : ""}
    <div class="card">
      <h3>Hour-usage alerts</h3>
      ${alerts.length===0 ? `<div class="small">No clients near their package limit.</div>` :
        alerts.map(a=>`<div class="alert ${a.level}">${a.text}</div>`).join("")}
    </div>
    <div class="card">
      <h3>Week ahead</h3>
      <div class="small" style="margin-bottom:8px;">Priority tasks and anything due within 7 days (including overdue).</div>
      ${weekAhead.length===0 ? `<div class="small">Nothing priority or due soon.</div>` : weekAhead.map(t=>{
        const client = state.clients.find(c=>c.id===t.clientId);
        const days = t.dueDate ? daysUntil(new Date(t.dueDate), now) : null;
        const dueLabel = t.dueDate ? (days<0 ? `overdue by ${Math.abs(days)}d` : days===0 ? "due today" : `due in ${days}d`) : "no due date";
        return `<div class="list-item" style="cursor:pointer;" onclick="openTaskEditor('${t.id}',null)">
          <div>${t.priority?'<span class="badge" style="background:var(--danger);">⚑</span> ':''}${t.title} <span class="small">(${client?client.name:'Internal'})</span></div>
          <span class="small" style="${days!==null&&days<0?'color:var(--danger);font-weight:600;':''}">${dueLabel}</span>
        </div>`;
      }).join("")}
    </div>
    <div class="card">
      <h3>Recent comments on your tasks</h3>
      ${recentComments.length===0 ? `<div class="small">No comments yet.</div>` : recentComments.map(d=>{
        const seenBy = d.seenBy || [];
        const iSeenIt = state.currentAssistant && seenBy.some(s=>s.assistantId===state.currentAssistant.id);
        const isMine = state.currentAssistant && d.author===state.currentAssistant.name;
        return `
        <div class="list-item" style="flex-direction:column;align-items:stretch;gap:4px;">
          <div class="flex-between" style="cursor:pointer;" onclick="openTaskEditor('${d.task.id}',null)">
            <div><strong>${d.author}</strong> on ${d.task.title}: ${d.text.length>90 ? d.text.slice(0,90)+"…" : d.text}</div>
            <span class="small">${new Date(d.date).toLocaleString()}</span>
          </div>
          ${!isMine ? `
          <div class="small" style="display:flex;justify-content:space-between;align-items:center;">
            <span>${iSeenIt ? "✓ You saw this" : "Not seen yet"}</span>
            ${!iSeenIt ? `<button class="secondary" style="padding:2px 8px;" onclick="markCommentSeen('${d.task.id}','${d.id}')">Mark as seen</button>` : ""}
          </div>` : ""}
        </div>`;
      }).join("")}
    </div>
    <div class="card">
      <h3>My open tasks</h3>
      ${renderTaskMiniList(myOpenTasks.slice(0,8))}
    </div>
  `;
}
function renderTaskMiniList(tasks){
  if(tasks.length===0) return `<div class="small">Nothing open.</div>`;
  return tasks.map(t=>{
    const client = state.clients.find(c=>c.id===t.clientId);
    return `<div class="list-item">
      <div>
        <span class="badge ${t.category==='Home'?'home':'business'}">${t.category||'—'}</span>
        ${t.title} <span class="small">(${client?client.name:'Internal'})</span>
      </div>
      <span class="small">${t.status}</span>
    </div>`;
  }).join("");
}

  const client = state.clients.find(c=>c.id===clientId);

  const alert = tierAlert(client);
  const subtabs = ["profile","tasks","notes","membership"];

  `;
}

function renderReferralStatus(client){

  return `

      <div class="alert ${status.stoppedEarly?'warn':'ok'}">

}

  if(!hrs || hrs<=0){ alert("Enter a positive number of hours to roll over."); return; }
  if(!periodStart){ alert("Pick which period this rollover applies to."); return; }
  upsert("clients", clientId, { rolloverHours: hrs, rolloverPeriodStart: periodStart });
}
function clearRollover(clientId){
  upsert("clients", clientId, { rolloverHours: null, rolloverPeriodStart: null });
}
function selectPackageTier(clientId, val){
  if(val==="custom") return;
  const tier = PACKAGE_TIERS.find(t=>t.key===val);
  if(!tier) return;
  upsert("clients", clientId, { packageHours: tier.hours, packagePrice: tier.price });
}
function markReferralPayoutPaid(clientId){
  const client = state.clients.find(c=>c.id===clientId);
  if(!client) return;
  upsert("clients", clientId, { referralPayoutsPaidCount: (client.referralPayoutsPaidCount||0) + 1 });
}

// touches existing time entries, so past history stays attributed correctly.
function openReassignModal(clientId){
  const client = state.clients.find(c=>c.id===clientId);

  state.modal = { type:"reassignClient", client };
  render();
}
function renderReassignModal(client){

function addClientNote(clientId){

  const notes = client.notes || [];
  upsert("clients", clientId, { notes: [...notes, { id:newId("note"), text, date:new Date().toISOString(), source:"manual" }] });
}

function setKanbanFilter(field, value){

function renderKanbanCard(t){

// --- Time tracking view ---
const TIME_FILTER_PRESETS = [
  ["today","Today"], ["last30","Last 30 days"], ["period","This pay period"],
  ["custom","Custom range"], ["all","All time"]
];
function timeFilterPeriod(){
  const f = state.timeFilter;
  const now = new Date();
  if(f.preset==="today"){
    const start = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    return { start, end: new Date(start.getTime()+86400000) };
  }
  if(f.preset==="last30"){
    const end = now;
    return { start: new Date(end.getTime()-30*86400000), end };
  }
  if(f.preset==="period") return currentPayrollPeriod();
  if(f.preset==="custom"){
    if(!f.customStart || !f.customEnd) return null;
    const start = new Date(f.customStart);
    const end = new Date(f.customEnd);
    end.setDate(end.getDate()+1); // inclusive of the selected end day
    return { start, end };
  }
  return null; // "all"
}
function timeFilterLabel(period){
  if(state.timeFilter.preset==="all" || !period) return "All entries";
  return formatPeriodRange(period);
}
function setTimeFilterPreset(preset){
  state.timeFilter.preset = preset;
  render();
}
function setTimeFilterCustom(which, val){
  state.timeFilter[which==="start"?"customStart":"customEnd"] = val;
  render();
}
function setTimeFilterAssistant(assistantId){
  state.timeFilter.assistantId = assistantId;
  render();
}
function renderTimeTracking(){
  const mineAll = state.currentAssistant ? state.timeEntries.filter(t=>t.assistantId===state.currentAssistant.id) : state.timeEntries;
  const active = state.currentAssistant && activeEntryFor(state.currentAssistant.id);
  const period = timeFilterPeriod();
  const assistantFilterId = state.role==="admin" ? state.timeFilter.assistantId : "all";
  const filtered = mineAll
    .filter(e => !period || (new Date(e.clockIn) >= period.start && new Date(e.clockIn) < period.end))
    .filter(e => assistantFilterId==="all" || e.assistantId===assistantFilterId);
  const totalHrs = filtered.reduce((s,e)=>s+entryDurationHours(e),0);
  const manualCount = filtered.filter(e=>e.clockOutManual).length;

  const assistantSummary = state.role==="admin" ? state.settings.assistants
    .filter(a=>assistantFilterId==="all" || a.id===assistantFilterId)
    .map(a=>{
      const own = state.timeEntries.filter(e=>e.assistantId===a.id);
      const own_ = own.filter(e => !period || (new Date(e.clockIn) >= period.start && new Date(e.clockIn) < period.end));
      const total = own_.reduce((s,e)=>s+entryDurationHours(e),0);
      const admin = own_.filter(e=>e.clientId===INTERNAL_CLIENT_ID).reduce((s,e)=>s+entryDurationHours(e),0);
      const manual = own_.filter(e=>e.clockOutManual).length;
      return { assistant:a, total, admin, manual };
    }).filter(r=>r.total>0 || r.assistant.active!==false).sort((a,b)=>b.total-a.total) : [];

  return `
    <h2>Time Tracking</h2>
    ${!active && state.currentAssistant ? `
      <div class="card">
        <h3>Clock in</h3>
        <input id="clockInTaskSelect" list="clockInTaskList" placeholder="Search by # or title...">
        <datalist id="clockInTaskList">${taskSearchOptions(state.tasks.filter(t=>t.status!=="Done"))}</datalist>
        <button style="margin-top:8px;" onclick="doClockIn()">Clock in</button>
        <div class="small" style="margin:10px 0 6px;">Or for general admin work not tied to a specific task:</div>
        <button class="secondary" onclick="clockInAdminWork(state.currentAssistant.id)">Clock in for Admin Work</button>
        <div class="small" style="margin:10px 0 6px;">Forgot to clock in earlier, or logging time after the fact?</div>
        <button class="secondary" onclick="openManualTimeEntry()">Log time manually</button>
      </div>` : ""}
    ${!state.currentAssistant && state.role==="admin" ? `
      <div class="card">
        <button class="secondary" onclick="openManualTimeEntry()">Log time manually for someone</button>
      </div>` : ""}
    ${state.role==="admin" ? `
    <div class="card">
      <h3>Hours by assistant</h3>
      <div class="small" style="margin-bottom:8px;">${timeFilterLabel(period)} — "Admin hours" is time clocked to Internal / Modern Co. work. "Manual" counts clock-outs where a time was typed in instead of captured live.</div>
      <div class="table-scroll"><table class="data-table">
        <thead><tr><th>Assistant</th><th>Total hours</th><th>Admin hours</th><th>Manual clock-outs</th></tr></thead>
        <tbody>
          ${assistantSummary.map(r=>`
            <tr>
              <td>${r.assistant.name}${r.assistant.active===false?' <span class="small">(former)</span>':''}</td>
              <td>${r.total.toFixed(1)}</td>
              <td>${r.admin.toFixed(1)}</td>
              <td>${r.manual>0 ? `<span style="color:var(--warn);font-weight:600;">${r.manual}</span>` : "0"}</td>
            </tr>`).join("") || `<tr><td colspan="4" class="small">No entries in this range.</td></tr>`}
        </tbody>
      </table></div>
    </div>` : ""}
    <div class="card">
      <div class="flex-between">
        <h3>Entries</h3>
        <div style="display:flex;gap:8px;">
          ${state.role==="admin" ? `
          <select style="width:auto;" onchange="setTimeFilterAssistant(this.value)">
            <option value="all" ${assistantFilterId==='all'?'selected':''}>All assistants</option>
            ${state.settings.assistants.map(a=>`<option value="${a.id}" ${assistantFilterId===a.id?'selected':''}>${a.name}${a.active===false?' (former)':''}</option>`).join("")}
          </select>` : ""}
          <select style="width:auto;" onchange="setTimeFilterPreset(this.value)">
            ${TIME_FILTER_PRESETS.map(([val,label])=>`<option value="${val}" ${state.timeFilter.preset===val?'selected':''}>${label}</option>`).join("")}
          </select>
          ${state.timeFilter.preset==="custom" ? `
            <input type="date" style="width:150px;" value="${state.timeFilter.customStart||''}" onchange="setTimeFilterCustom('start',this.value)">
            <input type="date" style="width:150px;" value="${state.timeFilter.customEnd||''}" onchange="setTimeFilterCustom('end',this.value)">
          ` : ""}
          <button class="secondary" onclick="exportTimeEntriesCsv()">Export CSV</button>
        </div>
      </div>
      <div class="stat-row" style="margin:8px 0 12px;">
        <div class="stat-tile">
          <div class="stat-label">Total hours — ${timeFilterLabel(period)}</div>
          <div class="stat-value">${totalHrs.toFixed(1)}</div>
          <div class="stat-sub">${filtered.length} ${filtered.length===1?'entry':'entries'}${manualCount>0 ? ` · <span style="color:var(--warn);">${manualCount} manually edited</span>` : ""}</div>
        </div>
      </div>
      ${filtered.slice().reverse().map(e=>{
        const task = state.tasks.find(t=>t.id===e.taskId);
        const isAdminWork = e.clientId===INTERNAL_CLIENT_ID;
        return `<div class="list-item">
          <div>${isAdminWork ? '<span class="badge">Admin</span>' : ''}${e.clockOutManual ? '<span class="badge" style="background:var(--warn);">Manual</span>' : ''}${e.flagged ? '<span class="badge" style="background:var(--danger);">Flagged</span>' : ''}${task?task.title:'(deleted task)'}${state.role==='admin'?` <span class="small">· ${assistantName(e.assistantId)}</span>`:''} <span class="small">${new Date(e.clockIn).toLocaleString()}</span>${e.note ? `<div class="small">"${e.note}"</div>` : ""}${e.flagNote ? `<div class="small" style="color:var(--danger);">Flagged: "${e.flagNote}"</div>` : ""}</div>
          <div style="display:flex;align-items:center;gap:8px;">${e.clockOut ? entryDurationHours(e).toFixed(2)+" hrs" : `<button onclick="doClockOut('${e.id}')">Clock out</button>`}${(state.role==='admin' || e.assistantId===state.currentAssistant?.id) ? `<button class="secondary" style="padding:2px 8px;" title="Edit this time entry" onclick="openTimeEntryEditor('${e.id}')">Edit</button>` : ""}${state.role==='admin' ? `<button class="secondary" style="padding:2px 8px;${e.flagged?'color:var(--danger);':''}" title="${e.flagged ? 'Unflag' : 'Flag for review'}" onclick="toggleFlagTimeEntry('${e.id}')">${e.flagged ? '⚑' : '⚐'}</button>` : ""}<button class="secondary" style="padding:2px 8px;" title="Delete this time entry" onclick="deleteTimeEntry('${e.id}')">✕</button></div>
        </div>`;
      }).join("") || `<div class="small">No entries in this range.</div>`}
    </div>
  `;
}
function taskSearchOptions(tasks){
  return tasks.map(t=>`<option value="#${t.taskNumber||'?'} — ${(t.title||'').replace(/"/g,'&quot;')}">`).join("");
}
function resolveTaskFromSearch(value){
  const v = (value||"").trim();
  const m = v.match(/^#(\d+)/);
  if(m){
    const t = state.tasks.find(t=>t.taskNumber===parseInt(m[1],10));
    if(t) return t;
  }
  return state.tasks.find(t=>t.title===v) || null;
}
function doClockIn(){
  const sel = document.getElementById("clockInTaskSelect");
  const task = resolveTaskFromSearch(sel.value);
  if(!task){ alert("Pick a task from the list first — search by its # or title."); return; }
  clockIn(task.id, state.currentAssistant.id);
}
function doClockOut(entryId){
  clockOut(entryId, null);
}

// --- Payroll reconciliation tool (admin only) ---
function renderPayrollTool(){
  const period = currentPayrollPeriod();
  const internal = internalHoursStatus(period);
  const realClients = state.clients.filter(c=>c.id!==INTERNAL_CLIENT_ID);
  const rows = realClients.map(c=>{
    const expected = expectedHoursPerPayrollPeriod(c);
    const actual = hoursForClientInPeriod(c.id, period);
    return { client:c, expected, actual, variance: actual - expected };
  }).sort((a,b)=>Math.abs(b.variance)-Math.abs(a.variance));
  const totalExpected = rows.reduce((s,r)=>s+r.expected,0);
  const totalActual = rows.reduce((s,r)=>s+r.actual,0);
  const flagged = rows.filter(r=>Math.abs(r.variance)>=2);
  const totalRevenue = realClients.reduce((s,c)=>s+expectedRevenuePerPayrollPeriod(c),0);
  const totalPayrollCost = state.settings.assistants.reduce((s,a)=>s+hoursInPeriod(state.timeEntries.filter(e=>e.assistantId===a.id), period)*(a.hourlyRate||0),0);
  const estMargin = totalRevenue - totalPayrollCost;

  return `
    <div class="flex-between">
      <h2>Payroll</h2>
      <span class="small">${formatPeriodRange(period)}</span>
    </div>

    <div class="stat-row">

      <div class="stat-tile">
        <div class="stat-label">Client hours paid for (prorated)</div>
        <div class="stat-value">${totalExpected.toFixed(1)}</div>
        <div class="stat-sub">this payroll period, across ${realClients.length} clients</div>

      <div class="stat-tile">
        <div class="stat-label">Client hours actually clocked</div>
        <div class="stat-value">${totalActual.toFixed(1)}</div>
        <div class="stat-sub">${(totalActual-totalExpected)>=0?'+':''}${(totalActual-totalExpected).toFixed(1)} vs. paid-for</div>
      </div>
      <div class="stat-tile ${flagged.length?'status-warn':''}">
        <div class="stat-label">Clients to double-check</div>
        <div class="stat-value">${flagged.length}</div>
        <div class="stat-sub">off by 2+ hrs from paid-for</div>
      </div>
      <div class="stat-tile ${estMargin<0?'status-danger':(totalRevenue && estMargin/totalRevenue<0.2)?'status-warn':''}">
        <div class="stat-label">Estimated margin</div>
        <div class="stat-value">$${estMargin.toFixed(0)}</div>
        <div class="stat-sub">$${totalRevenue.toFixed(0)} revenue &minus; $${totalPayrollCost.toFixed(0)} payroll</div>

      </div>
      <div class="small" style="margin-bottom:8px;">Every assistant, including any former employee still owed hours from this period. Rates are editable on the Team tab.</div>
      <div class="table-scroll"><table class="data-table">
        <thead><tr><th>Assistant</th><th>Hours worked</th><th>Rate</th><th>$ owed</th><th>Status</th></tr></thead>

          ${state.settings.assistants.map(a=>{

// --- Weekly client reports (admin only) ---
function renderReportsTab(){
  const week = currentReportWeek();
  const realClients = state.clients.filter(c=>c.id!==INTERNAL_CLIENT_ID);
  const rows = realClients.map(client=>{
    const weekReport = buildClientReport(client, week, "week");
    const periodWindow = currentBillingPeriod(client);
    const periodReport = periodWindow ? buildClientReport(client, periodWindow, "period") : null;
    return { client, weekReport, periodReport };
  });
  return `
    <div class="flex-between">
      <h2>Reports</h2>
      <span class="small">Week of ${formatPeriodRange(week)}</span>
    </div>
    <div class="small" style="margin-bottom:12px;">
      Each report is built live from current task statuses and hours — "In Progress" reflects tasks in that column right now.
      <strong>Weekly</strong> covers Saturday–Friday completions for the Friday client update; <strong>Period</strong> covers
      everything completed across the client's full current billing cycle, for their end-of-membership-period recap.
      Download and attach it to an email, or use Email to open a pre-filled message (your email client won't auto-attach the
      file — attach the download manually).
    </div>
    <div class="card">
      ${rows.length===0 ? `<div class="small">No clients yet.</div>` : rows.map(({client, weekReport, periodReport})=>`
        <div class="list-item" style="flex-direction:column;align-items:stretch;gap:10px;">
          <div class="flex-between">
            <strong>${client.name}</strong>
            <span class="small">${weekReport.hoursUsed.toFixed(1)} / ${weekReport.packageHours} hrs used this billing period${client.email ? "" : ' · <span style="color:var(--danger);">no email on file</span>'}</span>
          </div>
          <div class="row">
            <div>
              <div class="small" style="margin-bottom:4px;">Weekly &middot; ${weekReport.inProgress.length} in progress · ${weekReport.completed.length} completed this week</div>
              <button class="secondary" onclick="downloadClientReport('${client.id}','week')">Download</button>
              <button onclick="emailClientReport('${client.id}','week')">Email</button>
            </div>
            <div>
              <div class="small" style="margin-bottom:4px;">${periodReport ? "Period &middot; " + periodReport.completed.length + " completed &middot; ends " + periodReport.billingPeriod.end.toLocaleDateString() : "Period — set a renewal date on the Membership tab to enable"}</div>
              ${periodReport ? `
                <button class="secondary" onclick="downloadClientReport('${client.id}','period')">Download</button>
                <button onclick="emailClientReport('${client.id}','period')">Email</button>
              ` : ""}
            </div>
          </div>
          <div>
            <button class="secondary" style="padding:4px 10px;font-size:12px;" onclick="toggleReportReview('${client.id}')">${state.reportsExpanded && state.reportsExpanded.has(client.id) ? 'Hide' : 'Review'} tasks on this week's report</button>
          </div>
          ${state.reportsExpanded && state.reportsExpanded.has(client.id) ? `
          <div style="border-top:1px solid var(--cream-dark);padding-top:10px;">
            <div class="small" style="margin-bottom:6px;">These are exactly the tasks this week's report will include. Wrong status, wrong completed date, or shouldn't exist at all? Fix or remove it right here.</div>
            ${[...weekReport.inProgress.map(t=>({t,label:'In progress'})), ...weekReport.completed.map(t=>({t,label:'Completed '+(t.completedAt?new Date(t.completedAt).toLocaleDateString():'')}))].map(({t,label})=>`
              <div class="list-item">
                <div>${t.title} <span class="small">· ${label}</span></div>
                <div style="display:flex;gap:6px;">
                  <button class="secondary" style="padding:2px 8px;" onclick="openTaskEditor('${t.id}',null)">Edit</button>
                  <button class="danger" style="padding:2px 8px;" onclick="deleteTaskFromReports('${t.id}')">Delete</button>
                </div>
              </div>
            `).join("") || `<div class="small">Nothing on this report.</div>`}
          </div>` : ""}
        </div>
      `).join("")}
    </div>
  `;
}
function toggleReportReview(clientId){
  if(!state.reportsExpanded) state.reportsExpanded = new Set();
  if(state.reportsExpanded.has(clientId)) state.reportsExpanded.delete(clientId);
  else state.reportsExpanded.add(clientId);
  render();
}
function deleteTaskFromReports(taskId){
  if(!confirm("Delete this task? This can't be undone.")) return;
  remove("tasks", taskId);
}

}
function updateAssistantField(id, field, value){

  upsert("settings","access", { assistants: state.settings.assistants });
}

  state.settings.adminPasscode = pass;
  upsert("settings","access", { adminPasscode: pass });
}

  state.settings.assistants = state.settings.assistants.map(a=>a.id===id?{...a,active}:a);

}
function removeEmployee(id){
  const a = state.settings.assistants.find(x=>x.id===id);
  if(!a) return;
  if(!confirm(a.name + " will be marked as a former employee and lose app access. Their past tasks and time entries stay on record. Continue?")) return;
  setAssistantActive(id, false);
}

  state.settings.assistants = state.settings.assistants.map(a=>{

    const onboarding = (a.onboarding||[]).map(it=>it.id===itemId?{...it,done:!it.done}:it);
    return { ...a, onboarding };
  });

}

// No file-storage backend here (Firestore only), so a client photo gets
// resized/compressed to a JPEG data URL and stored right on the task
// document — keeps it well under Firestore's ~1MB document size limit
// instead of failing silently on a full-size phone photo.
function readAndCompressImage(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let width = img.width, height = img.height;
        if(width > maxDim || height > maxDim){
          const scale = maxDim / Math.max(width, height);
          width = Math.round(width*scale);
          height = Math.round(height*scale);
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
// Non-image files (PDFs, docs) can't be resized like a photo, so they're
// capped hard — there's no cloud storage wired up, everything lives inline
// on the Firestore doc, which tops out around 1MB total. Attachments share
// a combined budget well under that ceiling so title/subtasks/discussion
// always have room too — otherwise a doc can quietly exceed Firestore's
// limit and the write just fails (silently, before the fix that now alerts
// on a failed save).
const MAX_ATTACHMENT_BYTES = 400000;
const MAX_ATTACHMENTS_TOTAL_BYTES = 650000;
function readFileAsDataURL(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function currentAttachmentsBytes(task){
  return (task.attachments||[]).reduce((s,a)=>s+(a.dataUrl?a.dataUrl.length:0),0) + (task.requestImage?task.requestImage.length:0);
}
async function addTaskAttachment(taskId){
  const input = document.getElementById("tf_attachment");
  const file = input.files && input.files[0];
  if(!file) return;
  const task = state.tasks.find(t=>t.id===taskId) || (state.modal && state.modal.task);
  if(!task) return;
  let dataUrl;
  try{
    if(file.type.startsWith("image/")){
      dataUrl = await readAndCompressImage(file, 1400, 0.75);
    } else {
      if(file.size > MAX_ATTACHMENT_BYTES){
        alert(`That file is too big (${Math.round(file.size/1000)}KB) — attachments are capped around ${Math.round(MAX_ATTACHMENT_BYTES/1000)}KB since there's no separate file storage yet. Try a smaller file or a screenshot instead.`);
        return;
      }
      dataUrl = await readFileAsDataURL(file);
    }
  }catch(e){
    console.warn("Attachment read failed:", e);
    alert("Couldn't read that file.");
    return;
  }
  if(currentAttachmentsBytes(task) + dataUrl.length > MAX_ATTACHMENTS_TOTAL_BYTES){
    alert("This task's attachments are getting too large to save reliably. Remove an existing attachment before adding another, or attach fewer/smaller files.");
    return;
  }
  const attachments = [...(task.attachments||[]), {
    id: newId("attach"), name: file.name, type: file.type || "application/octet-stream",
    dataUrl, uploadedAt: new Date().toISOString()
  }];
  task.attachments = attachments;
  upsert("tasks", taskId, { attachments });
  input.value = "";
  render();
}
function removeTaskAttachment(taskId, attachmentId){
  const task = state.tasks.find(t=>t.id===taskId) || (state.modal && state.modal.task);
  if(!task) return;
  const attachments = (task.attachments||[]).filter(a=>a.id!==attachmentId);
  task.attachments = attachments;
  upsert("tasks", taskId, { attachments });
  render();
}
async function submitClientTaskRequest(clientId){
  const titleEl = document.getElementById("reqTitle");
  const detailsEl = document.getElementById("reqDetails");
  const categoryEl = document.getElementById("reqCategory");
  const imageEl = document.getElementById("reqImage");
  const submitBtn = document.getElementById("reqSubmitBtn");
  const title = titleEl.value.trim();
  if(!title){ alert("Please enter what you'd like help with."); return; }

  let requestImage = null;
  if(imageEl.files && imageEl.files[0]){
    submitBtn.disabled = true;
    submitBtn.textContent = "Processing photo...";
    try{
      requestImage = await readAndCompressImage(imageEl.files[0], 1000, 0.7);
    }catch(e){
      console.warn("Image processing failed:", e);
      alert("Couldn't process that photo — submitting the request without it.");
    }
    submitBtn.disabled = false;
    submitBtn.textContent = "Submit request";
  }

  const client = state.clients.find(c=>c.id===clientId);
  const task = {
    id: newId("task"),
    title,
    clientId,
    status: "Pending approval",
    category: categoryEl.value,
    taskNumber: nextTaskNumber(),
    assignees: (client && client.assistantIds) || [],
    subtasks: [],
    discussion: [],
    description: "",
    clientRequestNote: detailsEl.value.trim(),
    requestedByClient: true
  };
  if(requestImage) task.requestImage = requestImage;
  upsert("tasks", task.id, task);
  alert("Request submitted — your assistant will review and confirm it shortly.");
  render();
}
